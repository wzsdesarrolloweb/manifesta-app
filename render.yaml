services:
  # ── Backend (NestJS) ──────────────────────────────────────────────────────
  - type: web
    name: manifestacion-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: node dist/main
    envVars:
      - key: NODE_ENV
        value: production
      - key: OPENAI_API_KEY
        sync: false      # cargar en dashboard: tu clave de OpenAI
      - key: FRONTEND_URL
        sync: false      # cargar en dashboard: https://manifestacion-frontend.onrender.com

  # ── Frontend (Vite / Static Site) ─────────────────────────────────────────
  - type: web
    name: manifestacion-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false      # cargar en dashboard: https://manifestacion-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
